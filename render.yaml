databases:
  - name: breathe-db
    databaseName: breathe_prod
    user: breathe_user
    plan: free

services:
  # Django backend — Docker-based web service
  - type: web
    name: breathe-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /health/
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true          # Render generates a random value on first deploy
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-db
          property: connectionString
      # Update these two after your first deploy to match the actual Render URLs
      - key: ALLOWED_HOSTS
        value: "breathe-backend-1432.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-frontend-1432.onrender.com"

  # React frontend — Static site (free, no server needed)
  - type: web
    name: breathe-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Must match the exact URL of the breathe-backend service above
      - key: VITE_API_URL
        value: "https://breathe-backend-1432.onrender.com/api"
    routes:
      # All routes rewrite to index.html so React Router handles them client-side
      - type: rewrite
        source: /*
        destination: /index.html
